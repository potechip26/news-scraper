name: Naver News Scraper

on:
  schedule:
    - cron: "42 * * * *"
  workflow_dispatch:

concurrency:
  group: news-scraper
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  create-news-issue:
    name: Create news issue
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Check environment
        run: |
          echo "Checking environment..."
          java -version
          echo "NEWS_QUERY: ${NEWS_QUERY}"
          echo "NEWS_DISPLAY: ${NEWS_DISPLAY}"
          echo "NEWS_CATEGORY: ${NEWS_CATEGORY}"
        env:
          NEWS_QUERY: ${{ vars.NEWS_QUERY }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_CATEGORY: ${{ vars.NEWS_CATEGORY }}

      - name: Compile sources
        run: |
          echo "Compiling sources..."
          mkdir -p out
          javac -encoding UTF-8 -d out $(find src/oop -name "*.java")
          class_count=$(find out -name "*.class" | wc -l | tr -d " ")
          echo "Compiled ${class_count} classes"

      - name: Create news issue
        run: |
          echo "Starting news collection and issue creation..."
          java -cp out oop.search.presentation.GitHubNewsApp
          echo "Finished issue creation"
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEWS_QUERY: ${{ vars.NEWS_QUERY }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_CATEGORY: ${{ vars.NEWS_CATEGORY }}
